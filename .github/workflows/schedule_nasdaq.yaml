name: Run NASDAQ Stock Screener

on:
  schedule:
    # 💡 매주 화~토요일 아침 7시 10분(KST)에 실행 (미국 장 마감 직후 데이터 수집)
    - cron: '10 22 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install FinanceDataReader pandas yfinance

    - name: Run Screener Script
      run: |
        python update_data_nasdaq.py  # 👈 나스닥 스크립트 실행

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add result_nasdaq.csv last_update_nasdaq.txt
        git diff-index --quiet HEAD || (git commit -m "🤖 [Auto] Update NASDAQ stock data" && git pull --rebase && git push)
